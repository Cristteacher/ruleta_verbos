                    if (verb.endsWith('car') && finalStem.endsWith('c')) finalStem = finalStem.slice(0,-1) + 'qu';
                    if (verb.endsWith('gar') && finalStem.endsWith('g')) finalStem = finalStem + 'u'; 
                    if (verb.endsWith('zar') && finalStem.endsWith('z')) finalStem = finalStem.slice(0,-1) + 'c';
                }
                return finalStem + currentEnding;
            }

            if (tenseId === 'sub_imp') {
                let pret3pl = conjugate(verbObj, 'pret', 5);
                let base = pret3pl.slice(0, -3); 
                const endings = ["ra", "ras", "ra", "ramos", "rais", "ran"];
                if (personIdx === 3) {
                     let lastChar = base.slice(-1);
                     let newBase = base.slice(0, -1);
                     const vowels = {'a':'á', 'e':'é', 'i':'í', 'o':'ó', 'u':'ú'};
                     if (vowels[lastChar]) lastChar = vowels[lastChar];
                     return newBase + lastChar + endings[personIdx];
                }
                return base + endings[personIdx];
            }

            if (tenseId === 'cond') {
                const endings = ["ía", "ías", "ía", "íamos", "íais", "ían"];
                return verb + endings[personIdx];
            }

            if (tenseId === 'imp_comp') {
                const aux = ["había", "habías", "había", "habíamos", "habíais", "habían"];
                let part = "";
                if (ending === 'ar') part = stem + 'ado'; else part = stem + 'ido';
                if ((ending === 'er' || ending === 'ir') && ['a','e','o'].includes(stem.slice(-1))) part = stem + 'ído';
                if (verb === "Abrir") part = "abierto";
                if (verb === "Escribir") part = "escrito";
                if (verb === "Volver") part = "vuelto";
                if (verb === "Romper") part = "roto";
                if (verb === "Morir") part = "muerto";
                return `${aux[personIdx]} ${part}`;
            }

            if (tenseId === 'fut_comp') {
                const aux = ["habré", "habrás", "habrá", "habremos", "habréis", "habrán"];
                let part = "";
                if (ending === 'ar') part = stem + 'ado'; else part = stem + 'ido';
                if ((ending === 'er' || ending === 'ir') && ['a','e','o'].includes(stem.slice(-1))) part = stem + 'ído';
                if (verb === "Abrir") part = "abierto";
                if (verb === "Escribir") part = "escrito";
                if (verb === "Volver") part = "vuelto";
                if (verb === "Romper") part = "roto";
                if (verb === "Morir") part = "muerto";
                return `${aux[personIdx]} ${part}`;
            }

            return "Error";
        };

        // --- GAME SECTION ---
        const GameSection = ({ score, setScore, attempts, setAttempts, combo, setCombo, errors, setErrors, currentTheme, unlockedThemes, setCustomTheme, timeAttackMode, setTimeAttackMode, userProfile, onEditProfile }) => {
            const [currentVerb, setCurrentVerb] = useState(VERBS[0]);
            const [currentTense, setCurrentTense] = useState(TENSES[0]);
            const [currentPerson, setCurrentPerson] = useState(0);
            const [isSpinning, setIsSpinning] = useState(false);
            const [showAnswer, setShowAnswer] = useState(false);
            const [selectedTenses, setSelectedTenses] = useState(new Set(TENSES.map(t => t.id))); 
            const [selectedDifficulty, setSelectedDifficulty] = useState(DIFFICULTIES[1]); // Default Medium
            const [lockVerb, setLockVerb] = useState(false);
            const [userInput, setUserInput] = useState("");
            const [feedback, setFeedback] = useState(null);
            const [timeLeft, setTimeLeft] = useState(timeAttackMode ? 60 : selectedDifficulty.time);
            const [questionsAnswered, setQuestionsAnswered] = useState(0);
            const [isPaused, setIsPaused] = useState(false);
            const [hasStarted, setHasStarted] = useState(false);
            const [gameOver, setGameOver] = useState(false);
            const [reviewMode, setReviewMode] = useState(false); 
            const [streakBadges, setStreakBadges] = useState(() => {
                const saved = localStorage.getItem('streakBadges');
                return saved ? JSON.parse(saved) : [];

            const [showBadgeNotification, setShowBadgeNotification] = useState(null);
            const [immediateFeedback, setImmediateFeedback] = useState(() => {
                const saved = localStorage.getItem('ruletaVerbosImmediateFeedback');
                return saved !== null ? JSON.parse(saved) : true;
            }); // Toggle for immediate feedback

            useEffect(() => {
                localStorage.setItem('ruletaVerbosImmediateFeedback', JSON.stringify(immediateFeedback));
            }, [immediateFeedback]);

            const timerRef = useRef(null);
            const inputRef = useRef(null);

            // Streak Badge Milestones
            // Check for new badges
            useEffect(() => {
                const newBadges = STREAK_BADGES.filter(badge => 
                    combo >= badge.threshold && !streakBadges.includes(badge.id)
                );
                
                if (newBadges.length > 0) {
                    const updatedBadges = [...streakBadges, ...newBadges.map(b => b.id)];
                    setStreakBadges(updatedBadges);
                    localStorage.setItem('streakBadges', JSON.stringify(updatedBadges));
                    
                    // Show notification for the latest badge
                    setShowBadgeNotification(newBadges[newBadges.length - 1]);
                    setTimeout(() => setShowBadgeNotification(null), 3000);
                }
            }, [combo, streakBadges]);

            // Timer Logic
            useEffect(() => {
                if (gameOver) return;
                
                // Normal Mode Timer
                if (!timeAttackMode && hasStarted && !isSpinning && !showAnswer && !isPaused && timeLeft > 0) {
                    timerRef.current = setTimeout(() => setTimeLeft(timeLeft - 1), 1000);
                } 
                else if (!timeAttackMode && hasStarted && timeLeft === 0 && !showAnswer && !isSpinning && !isPaused) {
                    handleTimeout();
                }
                // Time Attack Timer (Global)
                else if (timeAttackMode && hasStarted && !isPaused && timeLeft > 0) {
                    timerRef.current = setTimeout(() => setTimeLeft(timeLeft - 1), 1000);
                }
                else if (timeAttackMode && hasStarted && timeLeft === 0 && !gameOver) {
                    setGameOver(true);
                }

                return () => clearTimeout(timerRef.current);
            }, [timeLeft, isSpinning, showAnswer, isPaused, hasStarted, timeAttackMode, gameOver]);

            // Reset Time Attack when toggling mode
            useEffect(() => {
                if (timeAttackMode) {
                    setTimeLeft(60);
                    setHasStarted(false);
                    setGameOver(false);
                } else {
                    setTimeLeft(selectedDifficulty.time);
                }
            }, [timeAttackMode, selectedDifficulty]); // Update when difficulty changes too

            const getImmediateFeedback = (input, correct) => {
                if (!immediateFeedback || input.length === 0) return null;
                const inputLower = input.toLowerCase();
                const correctLower = correct.toLowerCase();
                const normalize = (text) => text.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
                const inputNorm = normalize(inputLower);
                const correctNorm = normalize(correctLower);
                
                // If completely correct, show success
                if (inputLower === correctLower) {
                    return { type: 'correct', message: '¡Perfecto!' };
                }

                // If only accents are missing or wrong
                if (inputNorm === correctNorm) {
                    return { type: 'hint', message: `Revisa los acentos: debería ser '${correct}'`, fullCorrect: correct };
                }

                // If input matches the beginning, show hint about the rest
                if (correctNorm.startsWith(inputNorm)) {
                    const remaining = correctLower.slice(inputLower.length);
                    return { type: 'hint', message: `Buen inicio. Sigue con '${remaining}'`, fullCorrect: correct };
                }

                // If reflexive ending is missing and the rest is correct
                if (correctLower.endsWith('se') && inputNorm === normalize(correctLower.slice(0, -2))) {
                    return { type: 'hint', message: `No olvides el reflexivo 'se' al final`, fullCorrect: correct };
                }

                // If wrong, give a better suggestion based on shared letters
                const sameLetters = inputLower.split('').filter((char, idx) => correctLower[idx] === char).length;
                const suggestion = sameLetters >= 2 ? 'Buena base: revisa la terminación.' : 'Revisa los acentos y la terminación.';
                return { type: 'error', message: correct, suggestion };
            };

            const safeConjugate = (verbObj, tenseId, personIdx) => {
                try {
                    if (!verbObj || !tenseId) return '';
                    return conjugate(verbObj, tenseId, personIdx);
                } catch (e) {
                    console.error('Conjugation error:', e);
                    return '';
                }
            };

            const handleInputChange = (value) => {
                setUserInput(value);
                
                if (immediateFeedback && !showAnswer) {
                    const correct = safeConjugate(currentVerb, currentTense.id, currentPerson);
                    if (correct) {
                        const feedback = getImmediateFeedback(value, correct);
                        // Could add visual feedback here if needed
                    }
                }
            };
            
            const getVerbPool = () => {
                let pool = VERBS;
                if (selectedDifficulty.id === 'easy') {
                    // 70% chance regular, 30% chance irregular
                     if (Math.random() < 0.7) {
                        const regularVerbs = VERBS.filter(v => v.type === 'reg');
                        if (regularVerbs.length > 0) pool = regularVerbs;
                    } 
                } else if (selectedDifficulty.id === 'hard') {
                    // 70% chance irregular, 30% regular
                    if (Math.random() < 0.7) {
                        const irregularVerbs = VERBS.filter(v => v.type !== 'reg');
                        if (irregularVerbs.length > 0) pool = irregularVerbs;
                    }
                }
                // Medium is just full pool (random)
                return pool;
            };

            const getScoreDelta = (difficulty, isCorrect) => {
                switch(difficulty) {
                    case 'hard': return isCorrect ? 3 : -1;
                    case 'medium': return isCorrect ? 2 : -1;
                    case 'easy': default: return isCorrect ? 1 : -2;
                }
            };


            const spin = () => {
                if (isSpinning) return;
                setHasStarted(true);
                setShowAnswer(false);
                setFeedback(null);
                setUserInput("");
                if (!timeAttackMode) setTimeLeft(selectedDifficulty.time); 
                setIsSpinning(true);

                setTimeout(() => {
                    let nextVerb = currentVerb;
                    let nextTense = currentTense;
                    let nextPerson = Math.floor(Math.random() * 6);

                    if (reviewMode && errors.length > 0) {
                        const err = errors[Math.floor(Math.random() * errors.length)];
                        nextVerb = err.verb;
                        nextTense = err.tense;
                        nextPerson = err.person;
                    } else {
                        if (!lockVerb) {
                            const pool = getVerbPool();
                            nextVerb = pool[Math.floor(Math.random() * pool.length)];
                        }
                        
                        const availableTenses = TENSES.filter(t => selectedTenses.has(t.id));
                        const tensePool = availableTenses.length > 0 ? availableTenses : TENSES;
                        nextTense = tensePool[Math.floor(Math.random() * tensePool.length)];
                    }

                    setCurrentVerb(nextVerb);
                    setCurrentTense(nextTense);
                    setCurrentPerson(nextPerson);
                    setIsSpinning(false);
                    setTimeout(() => { if (inputRef.current) inputRef.current.focus(); }, 100);
                }, 800);
            };

            const handlePauseCheck = () => {
                if (timeAttackMode) return; 
                const newCount = questionsAnswered + 1;
                setQuestionsAnswered(newCount);
                if (newCount > 0 && newCount % 10 === 0) {
                    setIsPaused(true);
                } else {
                    setTimeout(() => spin(), 2500);
                }
            };

            const handleTimeout = () => {
                try {
                    setShowAnswer(true);
                    setFeedback('incorrect');
                    setAttempts(prev => prev + 1);
                    
                    const penalty = getScoreDelta(selectedDifficulty.id, false);
                    setScore(prev => Math.max(0, prev + penalty));

                    setCombo(0);
                    
                    const exists = errors.find(e => e.verb.inf === currentVerb.inf && e.tense.id === currentTense.id && e.person === currentPerson);
                    if (!exists) setErrors(prev => [...prev, { verb: currentVerb, tense: currentTense, person: currentPerson }]);

                    const correctAnswer = safeConjugate(currentVerb, currentTense.id, currentPerson);
                    if (correctAnswer) speakText(correctAnswer);

                    handlePauseCheck();
                } catch (e) {
                    console.error('Error in handleTimeout:', e);
                    setShowAnswer(true);
                    setFeedback('incorrect');
                }
            };

            const checkAnswer = () => {
                try {
                    const correctRaw = safeConjugate(currentVerb, currentTense.id, currentPerson);
                    if (!correctRaw) {
                        console.error('Failed to conjugate verb');
                        setShowAnswer(true);
                        setFeedback('incorrect');
                        return;
                    }
                    const correct = correctRaw.toLowerCase().trim();
                    const user = userInput.toLowerCase().trim();
                    
                    setShowAnswer(true);
                    setAttempts(prev => prev + 1);

                    if (user === correct) {
                        setFeedback('correct');
                        const multiplier = getMultiplier();
                        
                        const basePoints = getScoreDelta(selectedDifficulty.id, true);
                        setScore(prev => Math.max(0, prev + (basePoints * multiplier)));

                        setCombo(prev => prev + 1);
                        
                        if (timeAttackMode) setTimeLeft(prev => prev + 3);

                        if (reviewMode) {
                            setErrors(prev => prev.filter(e => !(e.verb.inf === currentVerb.inf && e.tense.id === currentTense.id && e.person === currentPerson)));
                            if (errors.length <= 1) setReviewMode(false); 
                        }

                    } else {
                        setFeedback('incorrect');
                        
                        const penalty = getScoreDelta(selectedDifficulty.id, false);
                        setScore(prev => Math.max(0, prev + penalty));
                        
                        setCombo(0);
                        
                        if (timeAttackMode) setTimeLeft(prev => Math.max(0, prev - 5));

                        const exists = errors.find(e => e.verb.inf === currentVerb.inf && e.tense.id === currentTense.id && e.person === currentPerson);
                        if (!exists) setErrors(prev => [...prev, { verb: currentVerb, tense: currentTense, person: currentPerson }]);
                    }
                    
                    const correctAnswer = safeConjugate(currentVerb, currentTense.id, currentPerson);
                    if (correctAnswer) speakText(correctAnswer);

                    if (timeAttackMode && !gameOver) {
                        setTimeout(() => spin(), 1500); 
                    } else if (!timeAttackMode) {
                        handlePauseCheck();
                    }
                } catch (e) {
                    console.error('Error in checkAnswer:', e);
                    setFeedback('incorrect');
                    setShowAnswer(true);
                }
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter' && !showAnswer && !isSpinning && !gameOver) checkAnswer();
            };

            if (gameOver) {
                return (
                    <div className="flex flex-col items-center justify-center h-full animate-in text-center p-8">
                        <div className="text-6xl mb-4">🏁</div>
                        <h2 className="text-3xl font-black text-gray-800 mb-2">¡Tiempo Terminado!</h2>
                        <p className="text-xl text-gray-600 mb-6">Puntuación Final: <span className="font-bold text-red-600">{score}</span></p>
                        <button onClick={() => { setScore(0); setAttempts(0); setTimeLeft(60); setGameOver(false); setHasStarted(false); }} className="px-8 py-3 bg-red-600 text-white font-bold rounded-full shadow-lg">Jugar Otra Vez</button>
                    </div>
                );
            }

            return (
                <div className="flex flex-col items-center w-full animate-in relative">
                    <BadgeNotification badge={showBadgeNotification} onClose={() => setShowBadgeNotification(null)} />
                    {isPaused && <PauseModal onResume={() => { setIsPaused(false); spin(); }} count={questionsAnswered} score={score} />}
                    <ScoreBoard score={score} attempts={attempts} currentTheme={currentTheme} unlockedThemes={unlockedThemes} setCustomTheme={setCustomTheme} userProfile={userProfile} onEditProfile={onEditProfile} streakBadges={streakBadges} />

                    <div className="flex-grow w-full max-w-6xl flex flex-col md:flex-row items-center justify-center gap-8 md:gap-12">
                        
                        {/* LEFT: CONTROLS */}
                        <div className="flex flex-col items-center gap-4 order-2 md:order-1 w-full md:w-1/3">
                            <DifficultySelector selectedDifficulty={selectedDifficulty} setSelectedDifficulty={setSelectedDifficulty} />
                            
                            <TenseSelector selectedTenses={selectedTenses} setSelectedTenses={setSelectedTenses} />
                            
                            <div className="flex flex-wrap justify-center gap-2 w-full max-w-xs">
                                <div className="flex items-center gap-2 bg-white p-2 rounded-lg border border-gray-200 shadow-sm cursor-pointer" onClick={() => setLockVerb(!lockVerb)}>
                                    <input type="checkbox" checked={lockVerb} onChange={() => {}} className="w-4 h-4 text-red-600 rounded" />
                                    <label className="text-xs font-bold text-gray-600 select-none cursor-pointer">🔒 Mismo verbo</label>
                                </div>
                                <div className={`flex items-center gap-2 p-2 rounded-lg border shadow-sm cursor-pointer ${timeAttackMode ? 'bg-red-50 border-red-200' : 'bg-white border-gray-200'}`} onClick={() => setTimeAttackMode(!timeAttackMode)}>
                                    <span className="text-xs font-bold text-gray-600 select-none">⚡ Contrarreloj</span>
                                </div>
                                <div className={`flex items-center gap-2 p-2 rounded-lg border shadow-sm cursor-pointer ${immediateFeedback ? 'bg-blue-50 border-blue-200' : 'bg-white border-gray-200'}`} onClick={() => setImmediateFeedback(!immediateFeedback)}>
                                    <span className="text-xs font-bold text-gray-600 select-none">💡 Ayuda inmediata: {immediateFeedback ? 'ON' : 'OFF'}</span>
                                </div>
                            </div>

                            {errors.length > 0 && (
                                <button 
                                    onClick={() => setReviewMode(!reviewMode)}
                                    className={`w-full max-w-xs py-2 px-4 rounded-lg text-xs font-bold border-2 transition ${reviewMode ? 'bg-orange-100 border-orange-400 text-orange-700' : 'bg-white border-gray-200 text-gray-500'}`}
                                >
                                    {reviewMode ? 'Modo: Repasando Fallos' : `Practicar ${errors.length} Fallos`}
                                </button>
                            )}

                            <div className="relative group cursor-pointer mt-2 hidden md:block" onClick={spin}>
                                <WheelIcon spinning={isSpinning} />
                            </div>
                            
                            <button onClick={spin} disabled={isSpinning || showAnswer} className={`w-full max-w-xs py-3 px-6 rounded-full shadow-lg font-bold text-white transition transform active:scale-95 ${timeAttackMode && hasStarted ? 'hidden' : 'block bg-red-600 hover:bg-red-700 border-b-4 border-red-800'}`}>
                                {showAnswer ? 'Siguiente...' : (hasStarted ? 'Siguiente Verbo' : '¡Empezar!')}
                            </button>
                        </div>

                        {/* RIGHT: CARD */}
                        <div className="w-full max-w-md order-1 md:order-2">
                            <div className={`relative w-full transition-all duration-300 transform ${isSpinning ? 'scale-95 opacity-80' : 'scale-100 opacity-100'}`}>
                                <ComboDisplay combo={combo} />
                                <div className="bg-white rounded-2xl shadow-2xl border-4 border-yellow-400 overflow-hidden flex flex-col relative min-h-[350px]">
                                    
                                    {/* Timer Bar */}
                                    {!showAnswer && !isSpinning && hasStarted && (
                                        <div className={`absolute top-0 left-0 h-2 z-10 timer-bar ${timeAttackMode && timeLeft < 10 ? 'bg-red-600 animate-pulse' : 'bg-red-500'}`} style={{width: `${(timeLeft / (timeAttackMode ? 60 : selectedDifficulty.time)) * 100}%`}}></div>
                                    )}

                                    <div className="h-3 w-full bg-red-600"></div>
                                    <div className="p-6 text-center space-y-4 flex-1 flex flex-col justify-center">
                                        
                                        {!hasStarted ? (
                                            <div className="py-10 text-gray-400 italic">
                                                <div className="text-4xl mb-2">👋</div>
                                                Configura tus opciones y<br/>pulsa <b>Empezar</b>
                                            </div>
                                        ) : (
                                            <>
                                                <div className="inline-block bg-yellow-100 text-yellow-800 px-4 py-1 rounded-full text-xs font-bold uppercase tracking-wider">{currentTense.label}</div>
                                                <div className="py-2">
                                                    <p className="text-gray-500 font-bold text-lg">{PERSONS[currentPerson]}</p>
                                                    <h2 className="text-5xl font-black text-gray-800 my-1">{currentVerb.inf}</h2>
                                                    <p className="text-red-400 font-medium italic text-lg">{currentVerb.trans}</p>
                                                </div>
                                                <div className="w-full pt-2">
                                                    {!showAnswer ? (
                                                        <div className="space-y-3">
                                                            <div className="relative">
                                                                <input 
                                                                    ref={inputRef} 
                                                                    type="text" 
                                                                    value={userInput} 
                                                                    onChange={(e) => handleInputChange(e.target.value)} 
                                                                    onKeyDown={handleKeyDown} 
                                                                    placeholder="Escribe la conjugación..." 
                                                                    className={`w-full p-3 text-center text-xl border-2 rounded-xl focus:outline-none transition-colors ${
                                                                        immediateFeedback && userInput ? 
                                                                            (() => {
                                                                                const correct = safeConjugate(currentVerb, currentTense.id, currentPerson);
                                                                                if (!correct) return 'border-gray-200';
                                                                                const feedback = getImmediateFeedback(userInput, correct);
                                                                                if (feedback?.type === 'correct') return 'border-green-500 bg-green-50';
                                                                                if (feedback?.type === 'hint') return 'border-blue-500 bg-blue-50';
                                                                                if (feedback?.type === 'error') return 'border-red-500 bg-red-50';
                                                                                return 'border-gray-200';
                                                                            })()
                                                                        : 'border-gray-200 focus:border-red-500'
                                                                    }`} 
                                                                    autoComplete="off" 
                                                                    autoCorrect="off" 
                                                                    autoCapitalize="none" 
                                                                />
                                                                {immediateFeedback && userInput && (() => {
                                                                    const correct = safeConjugate(currentVerb, currentTense.id, currentPerson);
                                                                    if (!correct) return null;
                                                                    const feedback = getImmediateFeedback(userInput, correct);
                                                                    if (feedback?.type === 'hint') {
                                                                        return (
                                                                            <div className="absolute right-3 top-1/2 transform -translate-y-1/2 text-blue-600 font-bold text-sm animate-pulse">
                                                                                {feedback.message}
                                                                            </div>
                                                                        );
                                                                    }
                                                                    return null;
                                                                })()}
                                                            </div>
                                                            {immediateFeedback && userInput && (() => {
                                                                const correct = safeConjugate(currentVerb, currentTense.id, currentPerson);
                                                                if (!correct) return null;
                                                                const feedback = getImmediateFeedback(userInput, correct);
                                                                if (feedback?.type === 'error') {
                                                                    return (
                                                                        <div className="text-center text-red-600 text-sm font-medium animate-in">
                                                                            Sugerencia: {feedback.message}
                                                                        </div>
                                                                    );
                                                                }
                                                                return null;
                                                            })()}
                                                            <button onClick={checkAnswer} className="w-full py-3 bg-gray-800 hover:bg-black text-white rounded-xl font-bold transition flex items-center justify-center gap-2">Comprobar Respuesta</button>
                                                            <div className="flex items-center justify-center gap-2 text-xs text-gray-400 font-bold">
                                                                <ClockIcon timeLeft={timeLeft} />
                                                                <span className={timeAttackMode && timeLeft < 10 ? "text-red-600 text-lg" : ""}>{timeLeft}s</span>
                                                            </div>
                                                        </div>
                                                    ) : (
                                                        <div className={`rounded-xl py-4 px-4 animate-in ${feedback === 'correct' ? 'bg-green-50 border-2 border-green-200' : 'bg-red-50 border-2 border-red-200'}`}>
                                                            <FeedbackCharacter type={feedback} />
                                                            {feedback === 'correct' ? <div className="text-green-700 font-bold text-lg mb-2">¡Correcto! {getMultiplier() > 1 && <span className="text-orange-500">x{getMultiplier()}</span>}</div> : <div className="text-red-600 font-bold text-lg mb-2">Incorrecto 😕</div>}
                                                            <div className="flex items-center justify-center gap-2">
                                                                <span className="text-3xl font-black text-gray-800 block mb-1">{safeConjugate(currentVerb, currentTense.id, currentPerson)}</span>
                                                                <AudioButton text={safeConjugate(currentVerb, currentTense.id, currentPerson)} />
                                                            </div>
                                                            {feedback === 'incorrect' && userInput && <div className="text-sm text-gray-500 mt-2">Tú escribiste: <span className="line-through decoration-red-400">{userInput}</span></div>}
                                                            {!timeAttackMode && <div className="w-full bg-gray-200 rounded-full h-1 mt-3 overflow-hidden"><div className="bg-gray-800 h-1 rounded-full animate-[width_2.5s_linear_forwards]" style={{width: '0%'}}></div></div>}
                                                        </div>
                                                    )}
                                                </div>
                                            </>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- STATS COMPONENT ---
        const StatsPanel = ({ errors }) => {
            if (errors.length === 0) return <div className="p-4 text-center text-gray-400 italic">No hay errores registrados aún. ¡Sigue así!</div>;
            
            // Simple frequency map
            const tenseCounts = {};
            errors.forEach(e => { tenseCounts[e.tense.label] = (tenseCounts[e.tense.label] || 0) + 1; });
            const sorted = Object.entries(tenseCounts).sort((a,b) => b[1] - a[1]);

            return (
                <div className="bg-white rounded-xl shadow p-6 border-t-4 border-red-500 mb-6">
                    <h3 className="font-bold text-gray-700 mb-4">📊 Tus Áreas de Mejora</h3>
                    <div className="space-y-2">
                        {sorted.map(([label, count]) => (
                            <div key={label} className="flex justify-between items-center text-sm">
                                <span>{label}</span>
                                <span className="font-bold bg-red-100 text-red-600 px-2 py-1 rounded-full">{count} errores</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // --- STUDY VIEW ---
        const StudySection = ({ errors }) => {
            const [search, setSearch] = useState("");
            const [selectedVerb, setSelectedVerb] = useState(null);
            const filteredVerbs = VERBS.filter(v => v.inf.toLowerCase().includes(search.toLowerCase()));

            return (
                <div className="w-full max-w-5xl px-4 animate-in flex flex-col md:flex-row gap-6 h-[75vh]">
                    <div className="w-full md:w-1/3 flex flex-col gap-4">
                        <StatsPanel errors={errors} />
                        <div className="flex flex-col bg-white rounded-xl shadow-lg border border-gray-200 overflow-hidden flex-1">
                            <div className="p-4 border-b border-gray-100 bg-gray-50">
                                <input type="text" placeholder="Buscar verbo..." className="w-full p-2 border border-gray-300 rounded-lg focus:outline-none focus:border-red-500" value={search} onChange={(e) => setSearch(e.target.value)} />
                            </div>
                            <div className="flex-1 overflow-y-auto">
                                {filteredVerbs.map(verb => (
                                    <div key={verb.inf} onClick={() => setSelectedVerb(verb)} className={`p-3 border-b border-gray-100 cursor-pointer transition hover:bg-yellow-50 flex justify-between items-center ${selectedVerb?.inf === verb.inf ? 'bg-yellow-100 border-l-4 border-l-red-500' : ''}`}>
                                        <span className="font-bold text-gray-700">{verb.inf}</span>
                                        <span className="text-xs text-gray-400 italic">{verb.trans}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                    <div className="w-full md:w-2/3 bg-white rounded-xl shadow-lg border-t-4 border-red-600 overflow-hidden flex flex-col">
                        {selectedVerb ? (
                            <div className="flex-1 overflow-y-auto p-6">
                                <div className="mb-6 border-b pb-4 flex justify-between items-start">
                                    <div>
                                        <h2 className="text-4xl font-black text-gray-800">{selectedVerb.inf}</h2>
                                        <p className="text-xl text-yellow-600 font-medium">{selectedVerb.trans}</p>
                                    </div>
                                    <div className="text-xs text-gray-400 uppercase tracking-widest text-right">
                                        Tipo: {selectedVerb.type === 'reg' ? 'Regular' : 'Irregular / Cambio de raíz'}
                                    </div>
                                </div>
                                <div className="space-y-8">
                                    {TENSES.map(tense => (
                                        <div key={tense.id}>
                                            <h3 className="font-bold text-red-700 uppercase text-sm mb-2 border-l-4 border-yellow-400 pl-2">{tense.label}</h3>
                                            <div className="grid grid-cols-2 md:grid-cols-3 gap-2">
                                                {PERSONS.map((person, idx) => (
                                                    <div key={idx} className="bg-gray-50 p-2 rounded border border-gray-100 text-sm">
                                                        <div className="text-[10px] text-gray-400 mb-1">{person}</div>
                                                        <div className="font-bold text-gray-700 flex justify-between">
                                                            {conjugate(selectedVerb, tense.id, idx)}
                                                            <button onClick={() => { const u = new SpeechSynthesisUtterance(conjugate(selectedVerb, tense.id, idx)); u.lang='es-ES'; window.speechSynthesis.speak(u); }} className="text-blue-400 hover:text-blue-600">🔊</button>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <div className="flex-1 flex flex-col items-center justify-center text-gray-400 p-8 text-center">
                                <span className="text-6xl mb-4">📚</span>
                                <p className="text-lg">Selecciona un verbo para estudiar.</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // --- TEST VIEW ---
        const TestSection = ({ score, setScore, attempts, setAttempts, setCombo, setErrors, errors, userProfile, onEditProfile }) => {
            const [question, setQuestion] = useState(null);
            const [selectedOption, setSelectedOption] = useState("");
            const [feedback, setFeedback] = useState(null); 
            const [selectedTestTenses, setSelectedTestTenses] = useState(new Set(TENSES.map(t => t.id))); 
            
            const [timeLeft, setTimeLeft] = useState(10);
            const [questionsAnswered, setQuestionsAnswered] = useState(0);
            const [isPaused, setIsPaused] = useState(false);
            const timerRef = useRef(null);
            
            const SENTENCE_TEMPLATES = {
                pres: "Generalmente, {p} ______ ({v}) {c}.",
                pret: "Ayer, {p} ______ ({v}) {c}.",
                imp: "Antes, {p} siempre ______ ({v}) {c}.",
                perf: "Esta semana, {p} ya ______ ({v}) {c}.",
                fut: "En el futuro, {p} ______ ({v}) {c}.",
                cond: "Si pudiera, {p} ______ ({v}) {c}.",
                sub_pres: "Es importante que {p} ______ ({v}) {c}.",
                sub_imp: "Me gustaría que {p} ______ ({v}) {c}.",
                imp_comp: "Antes de ayer, {p} ya había ______ ({v}) {c}.",
                fut_comp: "Mañana, {p} habrá ______ ({v}) {c}."
            };

            const generateQuestion = () => {
                const v = VERBS[Math.floor(Math.random() * VERBS.length)];
                const availableTenses = TENSES.filter(t => selectedTestTenses.has(t.id));
                const pool = availableTenses.length > 0 ? availableTenses : TENSES;
                const t = pool[Math.floor(Math.random() * pool.length)];
                const p = Math.floor(Math.random() * 6);
                const correctAns = conjugate(v, t.id, p);
                const distractors = new Set();
                while(distractors.size < 3) {
                    const randP = Math.floor(Math.random() * 6);
                    const randT = TENSES[Math.floor(Math.random() * TENSES.length)];
                    let wrongAns = conjugate(v, randT.id, randP);
                    if (wrongAns !== correctAns && wrongAns !== "?") distractors.add(wrongAns);
                }
                const options = [correctAns, ...Array.from(distractors)].sort(() => Math.random() - 0.5);
                setQuestion({ verb: v, tense: t, personIdx: p, correct: correctAns, options: options, template: SENTENCE_TEMPLATES[t.id] });
                setSelectedOption("");
                setFeedback(null);
                setTimeLeft(10);
            };

            useEffect(() => { generateQuestion(); }, []);

            const handleSelect = (val) => {
                setSelectedOption(val);
                setAttempts(prev => prev + 1);
                
                const correctAnswer = conjugate(question.verb, question.tense.id, question.personIdx);
                speakText(correctAnswer);

                if (val === question.correct) {
                    setFeedback({ type: 'correct', msg: '¡Correcto!' });
                    setScore(prev => prev + 1);
                    setCombo(prev => prev + 1);
                } else {
                    setFeedback({ type: 'incorrect', msg: `Incorrecto. Era: "${question.correct}".` });
                    setScore(prev => Math.max(0, prev - 1));
                    setCombo(0);
                    // Add to error bank from test too
                    const exists = errors.find(e => e.verb.inf === question.verb.inf && e.tense.id === question.tense.id && e.person === question.personIdx);
                    if (!exists) setErrors(prev => [...prev, { verb: question.verb, tense: question.tense, person: question.personIdx }]);
                }
                setTimeout(() => generateQuestion(), 2500);
            };

            useEffect(() => {
                if (!feedback && !isPaused && timeLeft > 0) {
                    timerRef.current = setTimeout(() => setTimeLeft(timeLeft - 1), 1000);
                } else if (timeLeft === 0 && !feedback && !isPaused) {
                    handleTimeout();
                }
                return () => clearTimeout(timerRef.current);
            }, [timeLeft, feedback, isPaused]);

            const handlePauseCheck = () => {
                const newCount = questionsAnswered + 1;
                setQuestionsAnswered(newCount);
                if (newCount > 0 && newCount % 10 === 0) {
                    setIsPaused(true);
                } else {
                    setTimeout(() => generateQuestion(), 2500);
                }
            };

            const handleResume = () => {
                setIsPaused(false);
                generateQuestion();
            };

            const handleTimeout = () => {
                setFeedback({ type: 'incorrect', msg: '¡Tiempo agotado!' });
                setAttempts(prev => prev + 1);
                setScore(prev => Math.max(0, prev - 1));
                
                const correctAnswer = conjugate(question.verb, question.tense.id, question.personIdx);
                speakText(correctAnswer);

                handlePauseCheck();
            };

            if (!question) return null;
            const filledTemplate = question.template.replace("{p}", `<span class="font-bold text-gray-800">${PERSONS[question.personIdx]}</span>`).replace("{v}", question.verb.inf).replace("{c}", question.verb.ctx); 

            return (
                <div className="w-full max-w-2xl px-4 animate-in flex flex-col items-center justify-center min-h-[60vh] mx-auto relative">
                    {isPaused && <PauseModal onResume={handleResume} count={questionsAnswered} score={score} />}
                    <ScoreBoard score={score} attempts={attempts} currentTheme="theme-spain" unlockedThemes={[]} setCustomTheme={() => {}} userProfile={userProfile} onEditProfile={onEditProfile} />
                    <div className="w-full max-w-xs mb-6"><TenseSelector selectedTenses={selectedTestTenses} setSelectedTenses={setSelectedTestTenses} /></div>
                    <div className="bg-white rounded-2xl shadow-xl border-t-8 border-blue-600 w-full p-8 text-center relative overflow-hidden">
                        {!feedback && <div className="absolute top-0 left-0 h-1 bg-blue-500 z-10 timer-bar" style={{width: `${(timeLeft / 10) * 100}%`}}></div>}
                        <h2 className="text-gray-400 font-bold uppercase text-xs tracking-widest mb-4">{question.tense.label}</h2>
                        <div className="text-2xl md:text-3xl text-gray-600 mb-8 leading-relaxed font-medium"><span dangerouslySetInnerHTML={{__html: filledTemplate}}></span></div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-6">
                            {question.options.map((opt, idx) => (
                                <button key={idx} onClick={() => !feedback && handleSelect(opt)} disabled={!!feedback} className={`p-4 rounded-xl border-2 font-bold text-lg transition-all ${feedback && opt === question.correct ? 'bg-green-100 border-green-500 text-green-800' : ''} ${feedback && opt === selectedOption && opt !== question.correct ? 'bg-red-100 border-red-500 text-red-800' : ''} ${!feedback ? 'bg-white border-gray-200 hover:border-blue-400 hover:bg-blue-50 text-gray-700' : ''} ${feedback && opt !== question.correct && opt !== selectedOption ? 'opacity-40 border-gray-100' : ''}`}>
                                    {opt}
                                </button>
                            ))}
                        </div>
                        <div className="h-16 flex items-center justify-center">
                            {feedback ? (
                                <div className={`flex flex-col items-center animate-in ${feedback.type === 'correct' ? 'text-green-600' : 'text-red-600'}`}>
                                    <div className="flex items-center gap-2">
                                        <FeedbackCharacter type={feedback.type} />
                                        <div><span className="text-2xl">{feedback.type === 'correct' ? '🎉' : '⚠️'}</span><span className="font-bold">{feedback.msg}</span></div>
                                        <AudioButton text={question.correct} />
                                    </div>
                                    <div className="w-32 bg-gray-200 rounded-full h-1 mt-2 overflow-hidden"><div className="bg-gray-800 h-1 rounded-full animate-[width_2.5s_linear_forwards]" style={{width: '0%'}}></div></div>
                                </div>
                            ) : (
                                <div className="flex items-center justify-center gap-2 text-xs font-bold text-gray-400">
                                    <ClockIcon timeLeft={timeLeft} />
                                    <span>{timeLeft}s</span>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // --- MAIN APP ---
        const App = () => {
            // Load initial state from local storage if available
            const savedData = JSON.parse(localStorage.getItem('ruletaVerbosData'));

            const [view, setView] = useState('game');
            const [score, setScore] = useState(savedData?.score || 0);
            const [attempts, setAttempts] = useState(savedData?.attempts || 0);
            const [combo, setCombo] = useState(0); 
            const [errors, setErrors] = useState(savedData?.errors || []);
            const [currentTheme, setCustomTheme] = useState(savedData?.currentTheme || 'theme-spain');
            const [unlockedThemes, setUnlockedThemes] = useState(savedData?.unlockedThemes || ['theme-spain']);
            const [timeAttackMode, setTimeAttackMode] = useState(false);
            const [userProfile, setUserProfile] = useState(savedData?.userProfile || null);
            const [isEditingProfile, setIsEditingProfile] = useState(false);

            // Save data effect
            useEffect(() => {
                const dataToSave = {
                    score,
                    attempts,
                    errors,
                    currentTheme,
                    unlockedThemes,
                    userProfile
                };
                localStorage.setItem('ruletaVerbosData', JSON.stringify(dataToSave));
            }, [score, attempts, errors, currentTheme, unlockedThemes, userProfile]);

            const resetProgress = () => {
                if(confirm("¿Estás seguro de que quieres borrar todo tu progreso?")) {
                    localStorage.removeItem('ruletaVerbosData');
                    window.location.reload();
                }
            };

            // Unlock Check
            useEffect(() => {
                const level = getCurrentLevel(score);
                if (!unlockedThemes.includes(level.theme)) {
                    setUnlockedThemes(prev => [...prev, level.theme]);
                    setCustomTheme(level.theme); // Auto-apply new theme
                }
            }, [score]);

            if (!userProfile || isEditingProfile) {
                return (
                    <ProfileSetup 
                        initialData={userProfile}
                        onComplete={(data) => {
                            setUserProfile(data);
                            setIsEditingProfile(false);
                        }} 
                    />
                );
            }

            return (
                <div className="min-h-screen flex flex-col items-center pb-8 transition-colors duration-1000">
                    <div className={`w-full h-4 shadow-md ${currentTheme}`}></div>
                    <header className="bg-white w-full py-4 px-4 flex flex-col md:flex-row justify-between items-center shadow-sm border-b-4 border-yellow-400 mb-6 gap-4">
                        <div>
                            <h1 className="text-2xl md:text-3xl font-black text-gray-800 tracking-tighter uppercase text-center md:text-left">Ruleta de Verbos</h1>
                            <p className="text-yellow-600 font-bold text-xs tracking-widest text-center md:text-left">Nivel B1 a C2</p>
                        </div>
                        <div className="bg-gray-100 p-1 rounded-full flex text-sm font-bold shadow-inner flex-wrap justify-center">
                            <button onClick={() => setView('game')} className={`px-4 md:px-6 py-2 rounded-full transition-all ${view === 'game' ? 'bg-gray-800 text-white shadow-md' : 'text-gray-500 hover:text-gray-700'}`}>Jugar</button>
                            <button onClick={() => setView('study')} className={`px-4 md:px-6 py-2 rounded-full transition-all ${view === 'study' ? 'bg-gray-800 text-white shadow-md' : 'text-gray-500 hover:text-gray-700'}`}>Estudiar</button>
                            <button onClick={() => setView('test')} className={`px-4 md:px-6 py-2 rounded-full transition-all ${view === 'test' ? 'bg-gray-800 text-white shadow-md' : 'text-gray-500 hover:text-gray-700'}`}>Test</button>
                        </div>
                    </header>

                    {view === 'game' && <GameSection 
                        score={score} setScore={setScore} 
                        attempts={attempts} setAttempts={setAttempts} 
                        combo={combo} setCombo={setCombo}
                        errors={errors} setErrors={setErrors}
                        currentTheme={currentTheme} unlockedThemes={unlockedThemes} setCustomTheme={setCustomTheme}
                        timeAttackMode={timeAttackMode} setTimeAttackMode={setTimeAttackMode}
                        userProfile={userProfile}
                        onEditProfile={() => setIsEditingProfile(true)}
                    />}
                    {view === 'study' && <StudySection errors={errors} />}
                    {view === 'test' && <TestSection score={score} setScore={setScore} attempts={attempts} setAttempts={setAttempts} setCombo={setCombo} setErrors={setErrors} errors={errors} userProfile={userProfile} onEditProfile={() => setIsEditingProfile(true)} />}

                    <footer className="w-full text-center text-gray-400 text-xs py-6 mt-auto">
                        Hecho con 💛 y ❤️ para practicar español
                        <br/>
                        <button onClick={resetProgress} className="mt-2 text-[10px] text-red-300 hover:text-red-500 underline">🗑️ Borrar Datos</button>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
